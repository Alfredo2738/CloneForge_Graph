<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge Spatial Graph</title>
    <link rel="stylesheet" href="style.css">
    

</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn active">3D Mode</a>
                <a href="vr.html" class="toggle-btn">VR Mode</a>
                <a href="ar.html" class="toggle-btn">AR Mode</a>
            </div>
        </header>

        <div id="info-panel">
            <h2 id="node-title">Concept Overview</h2>
            <div id="node-desc">Hover over or click a node to reveal detailed insights regarding the CloneForge architecture and pitch.</div>
        </div>
        
        <div class="instruction-toast">
            Left-Click & Drag to rotate • Scroll to zoom • Click node to focus
        </div>
    </div>

    <!-- Data Module -->
    <script type="module" src="app.js"></script>

</body>
</html>
