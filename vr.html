<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge VR Graph</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- VR Dependencies (Local to avoid CDN/CORS issues) -->
    <script src="node_modules/aframe/dist/aframe-master.min.js"></script>
    <script src="node_modules/3d-force-graph-vr/dist/3d-force-graph-vr.min.js"></script>
    <script src="node_modules/three-spritetext/dist/three-spritetext.min.js"></script>
    
    <style>
        /* Hide A-frame debug UI if any */
        .a-enter-vr { bottom: 20px !important; right: 20px !important; }
    </style>
</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn">3D Mode</a>
                <a href="vr.html" class="toggle-btn active">VR Mode</a>
                <a href="ar.html" class="toggle-btn">AR Mode</a>
            </div>
        </header>

        <div id="info-panel">
            <h2 id="node-title">VR Mode Enabled</h2>
            <div id="node-desc">Put on your headset and click the 'Enter VR' button in the bottom right corner to immerse yourself in the graph.</div>
        </div>
        
    </div>

    <!-- Data Module -->
    <script type="module">
        import { graphData } from './data.js';

        const colors = {
            1: '#00E5FF', 2: '#FF3366', 3: '#F2C94C', 4: '#27AE60',
            5: '#9B51E0', 6: '#F2994A', 7: '#56CCF2', 8: '#EB5757'
        };

        const infoPanel = document.getElementById('info-panel');
        const nodeTitle = document.getElementById('node-title');
        const nodeDesc = document.getElementById('node-desc');

        const elem = document.getElementById('graph-container');

        const Graph = ForceGraphVR()(elem)
            .graphData(graphData)
            .nodeAutoColorBy('group')
            .nodeRelSize(8)
            .linkOpacity(0.3)
            .linkWidth(1)
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .nodeThreeObject(node => {
                const sprite = new SpriteText(node.label);
                sprite.color = colors[node.group] || '#ffffff';
                sprite.textHeight = 4;
                return sprite;
            })
            .onNodeClick(node => {
                // Update UI on click
                nodeTitle.innerText = node.label;
                nodeTitle.style.color = colors[node.group] || '#ffffff';
                nodeDesc.innerText = node.description;
                infoPanel.classList.add('visible');

                // Dynamically move the graph to center the clicked node directly in front of the headset
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    graphEl.setAttribute('animation', `property: position; to: ${-node.x} ${-node.y + 1.6} ${-node.z - 40}; dur: 2000; easing: easeOutCubic`);
                }
            })
            .onNodeHover(node => {
                if(node) {
                     nodeTitle.innerText = node.label;
                     nodeTitle.style.color = colors[node.group] || '#ffffff';
                     nodeDesc.innerText = node.description;
                     infoPanel.classList.add('visible');
                }
            });
    </script>
</body>
</html>
