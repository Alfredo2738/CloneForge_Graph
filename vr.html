<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge VR Graph</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- VR Dependencies (Local to avoid CDN/CORS issues) -->
    <script src="node_modules/aframe/dist/aframe-master.min.js"></script>
    <script src="node_modules/3d-force-graph-vr/dist/3d-force-graph-vr.min.js"></script>
    <script src="node_modules/three-spritetext/dist/three-spritetext.min.js"></script>
    
    <style>
        /* Hide A-frame debug UI if any */
        .a-enter-vr { bottom: 20px !important; right: 20px !important; }
    </style>
</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn">3D Mode</a>
                <a href="vr.html" class="toggle-btn active">VR Mode</a>
                <a href="ar.html" class="toggle-btn">AR Mode</a>
            </div>
        </header>

        <div id="info-panel">
            <h2 id="node-title">VR Mode Enabled</h2>
            <div id="node-desc">Put on your headset and click the 'Enter VR' button in the bottom right corner to immerse yourself in the graph.</div>
        </div>
        
    </div>

    <!-- Data Module -->
    <script type="module">
        import { graphData } from './data.js';

        const colors = {
            1: '#00E5FF', 2: '#FF3366', 3: '#F2C94C', 4: '#27AE60',
            5: '#9B51E0', 6: '#F2994A', 7: '#56CCF2', 8: '#EB5757'
        };

        const infoPanel = document.getElementById('info-panel');
        const nodeTitle = document.getElementById('node-title');
        const nodeDesc = document.getElementById('node-desc');

        // Monkey-patch Three.js to completely disable Sprite raycasting.
        // This solves the persistent "Raycaster.camera needs to be set" error 
        // that breaks A-Frame's cursor interaction with SpriteText labels.
        if (typeof THREE !== 'undefined' && THREE.Sprite) {
            THREE.Sprite.prototype.raycast = function() {};
        }

        const elem = document.getElementById('graph-container');

        const Graph = ForceGraphVR()(elem)
            .graphData(graphData)
            .nodeAutoColorBy('group')
            .nodeColor(node => colors[node.group] || '#ffffff')
            .nodeResolution(32)
            .nodeVal(node => node.val || 1)
            .linkOpacity(0.3)
            .linkWidth(1)
            .linkColor(() => 'rgba(255, 255, 255, 0.2)')
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .linkDirectionalParticleSpeed(d => d.value * 0.005)
            .nodeThreeObjectExtend(true)
            .nodeThreeObject(node => {
                const nodeVal = node.val || 1;
                const sprite = new SpriteText(node.label);
                sprite.color = 'rgba(255, 255, 255, 0.8)';
                sprite.textHeight = Math.max(2, nodeVal * 0.4);
                sprite.position.y = -(Math.cbrt(nodeVal) * 1.5 + sprite.textHeight);
                return sprite;
            })
            .onNodeClick(node => {
                // Update UI on click
                nodeTitle.innerText = node.label;
                nodeTitle.style.color = colors[node.group] || '#ffffff';
                nodeDesc.innerText = node.description;
                infoPanel.classList.add('visible');

                // In VR, the camera pose is locked by WebXR headset tracking.
                // To simulate moving the camera TO the node, we inversely move the GRAPH towards the camera.
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    // Set a comfortable viewing distance
                    const distance = 40;
                    
                    // Create an ideal camera position if we were to look at the node from 'distance' away along its vector
                    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
                    const camPos = node.x || node.y || node.z
                        ? { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }
                        : { x: 0, y: 0, z: distance };
                        
                    // VR Base Camera is typically at (0, 1.6, 0).
                    // We want the node to be at (0, 1.6, -distance) relative to the user.
                    // Meaning the graph origin needs to shift.
                    // Simple inverse translation logic: 
                    // Graph pos = Head Pos (0, 1.6, 0) - Target Camera Pos (camPos)
                    const targetX = -camPos.x;
                    const targetY = 1.6 - camPos.y;
                    const targetZ = -camPos.z;

                    // Animate the graph to the new position
                    graphEl.setAttribute('animation', `property: position; to: ${targetX} ${targetY} ${targetZ}; dur: 2000; easing: easeOutCubic`);
                    
                    // To "look at" the node, the graph should be rotated so the node is between origin and the graph center.
                    // This is more complex to animate consistently via A-Frame without rig hierarchy, 
                    // so the translation alone achieves the 'zoom to node' effect perfectly.
                }
            })
            .onNodeHover(node => {
                if(node) {
                     nodeTitle.innerText = node.label;
                     nodeTitle.style.color = colors[node.group] || '#ffffff';
                     nodeDesc.innerText = node.description;
                     infoPanel.classList.add('visible');
                }
            });

        // Configure force physics to match the 3D mode and prevent node clumping
        Graph.d3Force('charge').strength(-150);
        Graph.d3Force('link').distance(link => link.source.id === "CloneForge" ? 100 : 50);

    </script>
</body>
</html>
