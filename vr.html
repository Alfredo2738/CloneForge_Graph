<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge VR Graph</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- VR Dependencies (Local to avoid CDN/CORS issues) -->
    <script src="node_modules/aframe/dist/aframe-master.min.js"></script>
    <script src="node_modules/3d-force-graph-vr/dist/3d-force-graph-vr.min.js"></script>
    <script src="node_modules/three-spritetext/dist/three-spritetext.min.js"></script>
    
    <style>
        /* Hide A-frame debug UI if any */
        .a-enter-vr { bottom: 20px !important; right: 20px !important; }
    </style>
</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn">3D Mode</a>
                <a href="vr.html" class="toggle-btn active">VR Mode</a>
                <a href="ar.html" class="toggle-btn">AR Mode</a>
            </div>
        </header>

        <div id="info-panel">
            <h2 id="node-title">VR Mode Enabled</h2>
            <div id="node-desc">Put on your headset and click the 'Enter VR' button in the bottom right corner to immerse yourself in the graph.</div>
        </div>
        
    </div>

    <script type="module">
        import { graphData } from './data.js';

        const colors = {
            1: '#00E5FF', 2: '#FF3366', 3: '#F2C94C', 4: '#27AE60',
            5: '#9B51E0', 6: '#F2994A', 7: '#56CCF2', 8: '#EB5757'
        };

        const infoPanel = document.getElementById('info-panel');
        const nodeTitle = document.getElementById('node-title');
        const nodeDesc = document.getElementById('node-desc');

        // Monkey-patch Three.js to completely disable Sprite raycasting.
        // This solves the persistent "Raycaster.camera needs to be set" error 
        // that breaks A-Frame's cursor interaction with SpriteText labels.
        if (typeof THREE !== 'undefined' && THREE.Sprite) {
            THREE.Sprite.prototype.raycast = function() {};
        }

        const elem = document.getElementById('graph-container');

        // Track selected and hovered states
        let hoverNode = null;
        let selectedNode = null;
        const highlightNodes = new Set();
        const highlightLinks = new Set();

        // Pre-calculate node neighbors
        graphData.links.forEach(link => {
            const a = graphData.nodes.find(n => n.id === link.source) || link.source;
            const b = graphData.nodes.find(n => n.id === link.target) || link.target;
            if (typeof a === 'object' && typeof b === 'object') {
                if (!a.neighbors) a.neighbors = [];
                if (!b.neighbors) b.neighbors = [];
                a.neighbors.push(b);
                b.neighbors.push(a);
                if (!a.links) a.links = [];
                if (!b.links) b.links = [];
                a.links.push(link);
                b.links.push(link);
            }
        });

        // Iridescent colors for particles
        const iridescentColors = ['#00FFFF', '#FF00FF', '#FFFF00', '#00FFCC'];

        const Graph = ForceGraphVR()(elem)
            .graphData(graphData)
            .nodeAutoColorBy('group')
            .nodeColor(node => {
                if (highlightNodes.size > 0 && !highlightNodes.has(node)) {
                    return 'rgba(255,255,255,0.1)';
                }
                return colors[node.group] || '#ffffff';
            })
            .nodeResolution(32)
            .nodeVal(node => node.val || 1)
            .linkOpacity(0.3)
            .linkWidth(link => highlightLinks.has(link) ? 2 : 1)
            .linkColor(link => {
                if (highlightNodes.size > 0 && !highlightLinks.has(link)) {
                    return 'rgba(255, 255, 255, 0.05)';
                }
                return 'rgba(255, 255, 255, 0.3)';
            })
            .linkDirectionalArrowLength(3)
            .linkDirectionalArrowRelPos(1)
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(link => highlightLinks.has(link) ? 3 : 1.5)
            .linkDirectionalParticleColor(() => iridescentColors[Math.floor(Math.random() * iridescentColors.length)])
            .linkDirectionalParticleSpeed(d => d.value * 0.005)
            .nodeThreeObjectExtend(true)
            .nodeThreeObject(node => {
                const group = new THREE.Group();
                const nodeVal = node.val || 1;
                
                const sprite = new SpriteText(node.label);
                sprite.color = colors[node.group] || '#ffffff';
                sprite.backgroundColor = 'rgba(0, 0, 0, 0.8)';
                sprite.borderColor = sprite.color;
                sprite.borderWidth = 1;
                sprite.borderRadius = 4;
                sprite.padding = [4, 2];
                
                let targetTextHeight = Math.max(2, nodeVal * 0.4);
                // Emphasize label if it is the selected node
                if (node === selectedNode) {
                    targetTextHeight *= 1.5;
                    sprite.fontWeight = 'bold';
                } else if (highlightNodes.has(node)) {
                    targetTextHeight *= 1.2;
                } else if (highlightNodes.size > 0) {
                    // Hide or shrink labels heavily if not highlighted
                    targetTextHeight *= 0.1;
                    sprite.color = 'rgba(255,255,255,0.1)';
                    sprite.backgroundColor = 'rgba(0,0,0,0)';
                    sprite.borderColor = 'rgba(0,0,0,0)';
                }

                sprite.textHeight = targetTextHeight;
                sprite.position.y = -(Math.cbrt(nodeVal) * 1.5 + sprite.textHeight);
                group.add(sprite);

                // Add a pulsing halo if this is the selected node
                if (node === selectedNode) {
                    const haloGeometry = new THREE.SphereGeometry(Math.cbrt(nodeVal) * 1.8, 32, 32);
                    const haloMaterial = new THREE.MeshBasicMaterial({
                        color: colors[node.group],
                        transparent: true,
                        opacity: 0.3,
                        blending: THREE.AdditiveBlending
                    });
                    const haloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
                    haloMesh.name = 'halo';
                    group.add(haloMesh);
                }

                return group;
            })
            .onNodeClick(node => {
                // Update UI on click
                nodeTitle.innerText = node.label;
                nodeTitle.style.color = colors[node.group] || '#ffffff';
                nodeDesc.innerText = node.description;
                infoPanel.classList.add('visible');

                // In VR, the camera pose is locked by WebXR headset tracking.
                // To simulate moving the camera TO the node, we inversely move the GRAPH towards the camera.
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    // Set a comfortable viewing distance
                    const distance = 40;
                    
                    // Create an ideal camera position if we were to look at the node from 'distance' away along its vector
                    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
                    const camPos = node.x || node.y || node.z
                        ? { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }
                        : { x: 0, y: 0, z: distance };
                        
                    // VR Base Camera is typically at (0, 1.6, 0).
                    // We want the node to be at (0, 1.6, -distance) relative to the user.
                    // Meaning the graph origin needs to shift.
                    const targetX = -camPos.x;
                    const targetY = 1.6 - camPos.y;
                    const targetZ = -camPos.z;

                    // Animate the graph to the new position
                    graphEl.setAttribute('animation', `property: position; to: ${targetX} ${targetY} ${targetZ}; dur: 2000; easing: easeOutCubic`);
                }

                selectedNode = node;
                updateHighlight();
            })
            .onNodeHover(node => {
                if (node !== hoverNode) {
                    hoverNode = node;
                    if (!selectedNode) {
                        updateHighlight();
                    }
                }

                if(node && !selectedNode) {
                     nodeTitle.innerText = node.label;
                     nodeTitle.style.color = colors[node.group] || '#ffffff';
                     nodeDesc.innerText = node.description;
                     infoPanel.classList.add('visible');
                } else if (!node && !selectedNode) {
                     infoPanel.classList.remove('visible');
                }
            })
            .onBackgroundClick(() => {
                selectedNode = null;
                updateHighlight();
                infoPanel.classList.remove('visible');
            });

        // Highlight Update Logic Function
        function updateHighlight() {
            highlightNodes.clear();
            highlightLinks.clear();

            const targetNode = selectedNode || hoverNode;

            if (targetNode) {
                highlightNodes.add(targetNode);
                if (targetNode.neighbors) {
                    targetNode.neighbors.forEach(neighbor => highlightNodes.add(neighbor));
                }
                if (targetNode.links) {
                    targetNode.links.forEach(link => highlightLinks.add(link));
                }
            }

            Graph
                .nodeColor(Graph.nodeColor())
                .linkColor(Graph.linkColor())
                .linkWidth(Graph.linkWidth())
                .nodeThreeObject(Graph.nodeThreeObject());
        }

        // Configure force physics
        Graph.d3Force('charge').strength(-150);
        Graph.d3Force('link').distance(link => link.source.id === "CloneForge" ? 100 : 50);

        // Animate the Halo in VR
        let startTime = Date.now();
        // Since ForceGraphVR doesn't expose onEngineTick directly like the 3D version, 
        // we use standard requestAnimationFrame for scene traversal patching
        function updateHalo() {
            const time = Date.now() - startTime;
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl && sceneEl.object3D) {
                sceneEl.object3D.traverse((obj) => {
                    if (obj.name === 'halo') {
                        const scale = 1 + Math.sin(time / 200) * 0.1;
                        obj.scale.set(scale, scale, scale);
                    }
                });
            }
            requestAnimationFrame(updateHalo);
        }
        updateHalo();

    </script>
</body>
</html>
