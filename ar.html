<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge AR Graph</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Native WebXR Passthrough Dependencies -->
    <!-- Native WebXR Passthrough Dependencies -->
    <script src="node_modules/aframe/dist/aframe-master.min.js"></script>
    <script src="node_modules/3d-force-graph-vr/dist/3d-force-graph-vr.min.js"></script>
    <script src="node_modules/three-spritetext/dist/three-spritetext.min.js"></script>
    
</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn">3D Mode</a>
                <a href="vr.html" class="toggle-btn">VR Mode</a>
                <a href="ar.html" class="toggle-btn active">AR Mode</a>
            </div>
        </header>

        <div id="info-panel" class="visible">
            <h2 id="node-title">AR Mode Enabled</h2>
            <h4>AR Passthrough Ready</h4>
            <p>Click the "Enter AR" button on your headset to view the graph in your physical space!</p>
        </div>
        
    </div>

    <!-- Data Module -->
    <script type="module">
        import { graphData } from './data.js';

        const colors = {
            1: '#00E5FF', 2: '#FF3366', 3: '#F2C94C', 4: '#27AE60',
            5: '#9B51E0', 6: '#F2994A', 7: '#56CCF2', 8: '#EB5757'
        };

        const infoPanel = document.getElementById('info-panel');
        const nodeTitle = document.getElementById('node-title');
        const nodeDesc = document.getElementById('node-desc');

        // Monkey-patch Three.js to completely disable Sprite raycasting.
        // This solves the persistent "Raycaster.camera needs to be set" error 
        // that breaks A-Frame's cursor interaction with SpriteText labels.
        if (typeof THREE !== 'undefined' && THREE.Sprite) {
            THREE.Sprite.prototype.raycast = function() {};
        }

        const elem = document.getElementById('graph-container');

        // Use the VR graph library, which is built on A-Frame and supports WebXR
        const Graph = ForceGraphVR()
          (document.getElementById('graph-container'))
            .graphData(graphData)
            .nodeAutoColorBy('group')
            .nodeColor(node => colors[node.group] || '#ffffff')
            .nodeResolution(32)
            .nodeVal(node => node.val || 1)
            .linkOpacity(0.3)
            .linkWidth(1)
            .linkColor(() => 'rgba(255, 255, 255, 0.2)')
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .linkDirectionalParticleSpeed(d => d.value * 0.005)
            .nodeThreeObjectExtend(true)
            // Position the graph comfortably in front of the user for AR passthrough
            .nodeThreeObject(node => {
                const nodeVal = node.val || 1;
                const sprite = new SpriteText(node.label);
                sprite.color = 'rgba(255, 255, 255, 0.8)';
                sprite.textHeight = Math.max(2, nodeVal * 0.4);
                sprite.position.y = -(Math.cbrt(nodeVal) * 1.5 + sprite.textHeight);
                return sprite;
            })
            .onNodeClick(node => {
                // Update UI on click
                nodeTitle.innerText = node.label;
                nodeTitle.style.color = colors[node.group] || '#ffffff';
                nodeDesc.innerText = node.description;
                infoPanel.classList.add('visible');

                // Dynamically move the graph to center the clicked node directly in front of the headset
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    // Animate the graph so the clicked node sits closely in front of the user (z=-2, y=1.6)
                    graphEl.setAttribute('animation', `property: position; to: ${-node.x} ${1.6 - node.y} ${-2 - node.z}; dur: 2000; easing: easeOutCubic`);
                }
            })
            .onNodeHover(node => {
                if(node) {
                     nodeTitle.innerText = node.label;
                     nodeTitle.style.color = colors[node.group] || '#ffffff';
                     nodeDesc.innerText = node.description;
                     infoPanel.classList.add('visible');
                }
            });
            
        // Configure force physics to match the 3D mode and prevent node clumping
        Graph.d3Force('charge').strength(-150);
        Graph.d3Force('link').distance(link => link.source.id === "CloneForge" ? 100 : 50);

        // Instantly configure the dynamically generated A-Frame scene for AR Passthrough
        setTimeout(() => {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl) {
                // Remove default background to allow camera passthrough
                sceneEl.setAttribute('background', 'transparent: true');
                // The correct A-Frame property to force the AR button is vr-mode-ui
                sceneEl.setAttribute('vr-mode-ui', 'enterModeButton: #enter-ar');
                // Configure WebXR to request an AR session and local floor tracking
                sceneEl.setAttribute('webxr', 'optionalFeatures: hit-test, local-floor; mode: ar;');
                // To allow users without controllers to click in AR, we could add a cursor 
                sceneEl.setAttribute('cursor', 'rayOrigin: mouse;');

                // Move the entire graph slightly forward and down
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    graphEl.setAttribute('position', '0 1 -2');
                }

                // Manually trigger the physics engine to 'warm up' so nodes aren't clumped
                Graph.d3ReheatSimulation();
            }
        }, 100);

    </script>
</body>
</html>
