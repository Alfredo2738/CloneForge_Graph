<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneForge AR Graph</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Native WebXR Passthrough Dependencies -->
    <!-- Native WebXR Passthrough Dependencies -->
    <script src="node_modules/aframe/dist/aframe-master.min.js"></script>
    <script src="node_modules/3d-force-graph-vr/dist/3d-force-graph-vr.min.js"></script>
    <script src="node_modules/three-spritetext/dist/three-spritetext.min.js"></script>
    
</head>
<body>
    
    <div id="graph-container"></div>
    
    <div id="ui-layer">
        <header>
            <div class="title-container">
                <h1>CloneForge Matrix</h1>
                <p class="subtitle">Empathy AI for Mirrored Connections</p>
            </div>
            
            <div class="mode-toggles">
                <a href="index.html" class="toggle-btn">3D Mode</a>
                <a href="vr.html" class="toggle-btn">VR Mode</a>
                <a href="ar.html" class="toggle-btn active">AR Mode</a>
            </div>
        </header>

        <div id="info-panel" class="visible">
            <h2 id="node-title">AR Mode Enabled</h2>
            <h4>AR Passthrough Ready</h4>
            <p>Click the "Enter AR" button on your headset to view the graph in your physical space!</p>
        </div>
        
    </div>

    <!-- Data Module -->
    <script type="module">
        import { graphData } from './data.js';

        const colors = {
            1: '#00E5FF', 2: '#FF3366', 3: '#F2C94C', 4: '#27AE60',
            5: '#9B51E0', 6: '#F2994A', 7: '#56CCF2', 8: '#EB5757'
        };

        const infoPanel = document.getElementById('info-panel');
        const nodeTitle = document.getElementById('node-title');
        const nodeDesc = document.getElementById('node-desc');

        const elem = document.getElementById('graph-container');

        // Use the VR graph library, which is built on A-Frame and supports WebXR
        const Graph = ForceGraphVR()
          (document.getElementById('graph-container'))
            .graphData(graphData)
            .nodeAutoColorBy('group')
            .nodeRelSize(8)
            .linkOpacity(0.3)
            .linkWidth(1)
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .nodeLabel(node => `${node.id}: ${node.description}`)
            // Position the graph comfortably in front of the user for AR passthrough
            .nodeThreeObject(node => {
                const sprite = new SpriteText(node.label);
                sprite.color = colors[node.group] || '#ffffff'; // Use node group color
                sprite.textHeight = 4;
                return sprite;
            })
            .onNodeClick(node => {
                // Update UI on click
                nodeTitle.innerText = node.label;
                nodeTitle.style.color = colors[node.group] || '#ffffff';
                nodeDesc.innerText = node.description;
                infoPanel.classList.add('visible');

                // Dynamically move the graph to center the clicked node directly in front of the headset
                const graphEl = document.querySelector('[forcegraph]');
                if (graphEl) {
                    graphEl.setAttribute('animation', `property: position; to: ${-node.x} ${-node.y + 1.6} ${-node.z - 40}; dur: 2000; easing: easeOutCubic`);
                }
            })
            .onNodeHover(node => {
                if(node) {
                     nodeTitle.innerText = node.label;
                     nodeTitle.style.color = colors[node.group] || '#ffffff';
                     nodeDesc.innerText = node.description;
                     infoPanel.classList.add('visible');
                }
            });
            
        // Wait for the A-Frame scene to initialize, then configure it for AR Passthrough
        setTimeout(() => {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl) {
                // Remove default background to allow camera passthrough
                sceneEl.setAttribute('background', 'transparent: true');
                // Force the WebXR enter button to trigger AR Mode instead of VR
                sceneEl.setAttribute('xr-mode-ui', 'XRMode: ar');
                // Configure WebXR to request an AR session
                sceneEl.setAttribute('webxr', 'optionalFeatures: hit-test, local-floor; mode: ar');
            }
        }, 500);
    </script>
</body>
</html>
